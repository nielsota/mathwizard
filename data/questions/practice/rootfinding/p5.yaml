stem: "Los de volgende vergelijkingen op voor \\(0 \\leq x < 2\\pi\\). Bij deze opgaven moet je eerst een goniometrische identiteit toepassen voordat de vergelijking oplosbaar wordt. Denk aan: \\(\\sin^2(x) + \\cos^2(x) = 1\\), \\(\\cos(2x) = 2\\cos^2(x) - 1\\), en \\(\\sin(2x) = 2\\sin(x)\\cos(x)\\)."
