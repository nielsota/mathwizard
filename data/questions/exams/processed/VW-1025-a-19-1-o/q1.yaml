question_number: '1'
question_text: '


  Gegeven is cirkel \( c \) met middelpunt \( (1, 7) \) en straal \( 5 \).

  \[

  \begin{pmatrix} x \\ y \end{pmatrix} = t \cdot \begin{pmatrix} 1 \\ 2 \end{pmatrix}

  \]

  is een vectorvoorstelling van een lijn \( k \) door de oorsprong.


  Lijn \( k \) snijdt cirkel \( c \) in twee punten.


  1. Bereken exact de coördinaten van deze snijpunten.'
