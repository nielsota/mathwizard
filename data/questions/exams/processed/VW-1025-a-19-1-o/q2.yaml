question_text: "\n\nDe functies \\( f \\) en \\( g \\) zijn gegeven door:\n\\[\n\\\
  begin{align*}\nf(x) &= 3 \\cos(2x) - \\sqrt{2x} \\\\ \ng(x) &= 3 - \\sqrt{2x}\n\\\
  end{align*}\n\\]\nDe grafiek van \\( g \\) snijdt de \\( x \\)-as in punt \\( A\
  \ \\).\nDe grafiek van \\( f \\) heeft diverse toppen, alle met een positieve \\\
  ( x \\)-coördinaat.\nPunt \\( B \\) is de derde van deze toppen.\nZie de figuur.\n\
  \nEr geldt: punt \\( B \\) ligt rechts van punt \\( A \\).\n\n2. Toon dit aan met\
  \ behulp van de afgeleide van \\( f \\)."
