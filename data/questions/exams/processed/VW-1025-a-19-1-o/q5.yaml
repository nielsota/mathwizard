question_number: '5'
question_text: 'De functies \( f \) en \( g \) worden gegeven door:

  \[

  f(x) = x \ln(x) - x + 1 \\

  g(x) = f''(x)

  \]


  5p \hspace{1em} 8 \ Bereken exact de \( x \)-coördinaten van de snijpunten van de
  grafieken van \( f \) en \( g \).


  Er is één waarde van \( p \) waarvoor geldt:

  \[

  \int_{p}^{2p} g(x) \, dx = 0

  \]

  Voor deze waarde van \( p \) is de situatie in de figuur geschetst.


  7p \hspace{1em} 9 \ Bereken exact deze waarde van \( p \). Schrijf je eindantwoord
  in de vorm \( p = ae \), waarbij \( a \) een getal is.'
