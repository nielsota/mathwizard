question_text: 'De functie \( f \) wordt gegeven door \( f(x) = 6\sqrt{x} \). Het
  punt \( P \) is een punt op de grafiek van \( f \) rechts van de \( y \)-as. Zie
  de figuur.


  In de figuur is het punt \( P \) zo gekozen dat er een punt \( P'' \) bestaat met
  de volgende eigenschappen:

  - \( P'' \) ligt op de negatieve \( x \)-as;

  - Lijnstuk \( OP'' \) heeft dezelfde lengte als lijnstuk \( OP \);

  - \( \angle POP'' = 120^\circ \).


  Bereken exact de \( x \)-coördinaat van \( P'' \).'
