question_text: 'Gegeven is het vierkant \( OABC \) met hoekpunten \( O(0,0) \), \(
  A(1,0) \), \( B(1,1) \) en \( C(0,1) \). Verder zijn gegeven het punt \( P(p,0)
  \) en het punt \( Q\left(\frac{1}{p},0\right) \), met \( 0 < p < 1 \).


  In figuur 1 zijn de vectoren \( \overrightarrow{CP} \), \( \overrightarrow{CA} \)
  en \( \overrightarrow{CQ} \) voor een willekeurige waarde van \( p \) weergegeven.


  8. Bewijs dat voor elke waarde van \( p \) de hoek tussen de vectoren \( \overrightarrow{CP}
  \) en \( \overrightarrow{CA} \) gelijk is aan de hoek tussen de vectoren \( \overrightarrow{CA}
  \) en \( \overrightarrow{CQ} \).


  \( M \) is het midden van lijnstuk \( PB \). Zie figuur 2, waarin ook lijnstuk \(
  PB \) en vector \( \overrightarrow{QM} \) zijn getekend.


  9. In figuur 2 is \( p \) zo gekozen dat vector \( \overrightarrow{QM} \) loodrecht
  staat op lijnstuk \( PB \). Bereken deze waarde van \( p \). Geef je eindantwoord
  in twee decimalen.'
