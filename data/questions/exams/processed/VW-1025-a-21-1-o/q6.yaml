  \ scheve asymptoot ligt.} \\]\n\nVoor elke waarde van \\( p > 0 \\) heeft de grafiek\
  \ van \\( f_p \\) één top.  \n\\[  \\text{5p 12} \\quad \\text{Bewijs dat er een\
  \ lijn is waarop al deze toppen liggen.} \\]"
