question_text: 'De beweging van een punt \( P \) wordt beschreven door de volgende
  bewegingsvergelijkingen:

  \[

  \begin{cases}

  x(t) = t^2 \\

  y(t) = t^2 - 2t

  \end{cases}

  \]

  Gegeven is de lijn met vergelijking \( x = a \), waarbij \( a > 0 \).

  Deze lijn snijdt de \( x \)-as in punt \( Q \) en de baan van \( P \) in de punten
  \( R \) en \( S \), waarbij de \( y \)-coördinaat van \( S \) groter is dan de \(
  y \)-coördinaat van \( R \).

  Zie de figuur.


  Als \( a \) onbegrensd toeneemt, nadert de verhouding \( \frac{QR}{QS} \) tot een
  limiet.


  Bereken exact deze limiet.'
