question_number: '5'
question_text: 'De functie \( f \) is gegeven door \( f(x) = x^2 \).

  De raaklijn aan de grafiek van \( f \) in een punt \( P(p, p^2) \) met \( p > 0
  \) snijdt de \( x \)-as in een punt \( A \).

  \( V \) is het vlakdeel dat wordt ingesloten door de grafiek van \( f \) en de lijn
  \( OP \).

  Zie de figuur.


  Bewijs dat de oppervlakte van driehoek \( OAP \) anderhalf keer zo groot is als
  de oppervlakte van \( V \).'
