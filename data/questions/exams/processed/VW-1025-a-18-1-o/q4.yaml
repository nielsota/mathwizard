question_text: '

  De functie \( f \) wordt gegeven door \( f(x) = 6\sin(x) - \cos(2x) \).


  De grafiek van \( f \) heeft oneindig veel toppen.


  Berekén exact de \( x \)-coördinaten van alle toppen van de grafiek van \( f \).


  Een van de toppen is het punt \( P(\frac{1}{2}\pi, -5) \).


  De grafiek van \( f \) is symmetrisch ten opzichte van de verticale lijn door \(
  P \).


  Boven \( P \) wordt een horizontaal lijnstuk van lengte 2 geplaatst, waarvan de
  eindpunten op de grafiek van \( f \) liggen. Zie de figuur.


  Berekén de afstand van \( P \) tot het horizontale lijnstuk. Rond je eindantwoord
  af op twee decimalen.'
