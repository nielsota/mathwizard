question_text: 'Voor \( x > 0 \) wordt de functie \( f \) gegeven door \( f(x) = \frac{1}{x}
  \).


  In de figuur is de grafiek van \( f \) getekend. Onder de grafiek is een vierkant
  getekend met twee zijden evenwijdig aan de \( x \)-as en twee zijden evenwijdig
  aan de \( y \)-as.


  Het vierkant heeft linksonder hoekpunt \( (1, 0) \). Het hoekpunt rechtsboven ligt
  op de grafiek van \( f \).


  Bereken exact de lengte van de zijde van het vierkant.


  Let op: de laatste vragen van dit examen staan op de volgende pagina.'
