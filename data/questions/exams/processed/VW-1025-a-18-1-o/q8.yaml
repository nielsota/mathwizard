question_number: '8'
question_text: 'Gegeven zijn de punten \( A(1, 0) \) en \( B(0, 1) \). Punt \( C \)
  bevindt zich op de kwartcirkel door \( A \) en \( B \) met middelpunt \( O(0, 0)
  \). Op de lijnstukken \( AC \) en \( BC \) worden twee vierkanten \( ADEC \) en
  \( BCFG \) getekend. Zie figuur 1.


  De grootte van hoek \( AOC \) (in radialen) noemen we \( t \), met \( 0 < t < \frac{1}{2}
  \pi \). Punt \( C \) heeft dus coördinaten \( (\cos(t), \sin(t)) \).


  Er is een waarde van \( t \) waarvoor de oppervlakte van vierkant \( ADEC \) twee
  keer zo groot is als de oppervlakte van vierkant \( BCFG \). Bereken deze waarde
  van \( t \). Rond je eindantwoord af op twee decimalen.


  In figuur 2 is de situatie van figuur 1 uitgebreid met vector \( \overrightarrow{OF}
  \). Deze figuur staat vergroot op de uitwerkbijlage.


  Voor elke waarde van \( t \) met \( 0 < t < \frac{1}{2} \pi \) geldt: \( \overrightarrow{OF}
  = \begin{pmatrix} 1 - \sin(t) + \cos(t) \\ \sin(t) + \cos(t) \end{pmatrix} \)


  Bewijs dit. Je kunt hierbij gebruikmaken van de figuur op de uitwerkbijlage.'
