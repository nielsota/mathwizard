stem: 'De functie \( f \) wordt gegeven door \( f(x) = x - x^2 \).


  Het punt \( T \left( \frac{1}{2}, \frac{1}{4} \right) \) is de top van de grafiek
  van \( f \).

  De lijn \( l \) is de raaklijn aan de grafiek van \( f \) in de oorsprong.

  De lijn \( m \) staat loodrecht op lijn \( l \) en gaat door \( T \).

  \( V \) is het vlakdeel dat wordt ingesloten door lijn \( m \) en de grafiek van
  \( f \).

  Zie de figuur.'
title: Oppervlakte van V
