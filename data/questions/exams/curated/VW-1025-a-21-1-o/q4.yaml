stem: 'Gegeven is het vierkant \( OABC \) met hoekpunten \( O(0,0) \), \( A(1,0) \),
  \( B(1,1) \) en \( C(0,1) \). Verder zijn gegeven het punt \( P(p,0) \) en het punt
  \( Q\left(\frac{1}{p},0\right) \), met \( 0 < p < 1 \).


  In figuur 1 zijn de vectoren \( \overrightarrow{CP} \), \( \overrightarrow{CA} \)
  en \( \overrightarrow{CQ} \) voor een willekeurige waarde van \( p \) weergegeven.'
title: Vierkant \(OABC\) met punten \(P\) en \(Q\)
