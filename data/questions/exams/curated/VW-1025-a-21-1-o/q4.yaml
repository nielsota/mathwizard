  points: 0
  text: 'Het punt \( M \) is het midden van lijnstuk \(PB\). Zie figuur 2, waarin
    ook lijnstuk \(PB\) en vector \( \overrightarrow{QM} \) zijn getekend.


    In figuur 2 is \( p \) zo gekozen dat vector \( \overrightarrow{QM} \) loodrecht
    staat op lijnstuk \( PB \). Bereken deze waarde van \( p \). Geef je eindantwoord
    in twee decimalen.'
