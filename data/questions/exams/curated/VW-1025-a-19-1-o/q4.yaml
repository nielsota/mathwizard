parts:
- label: a
  points: 0
  text: Bereken de grootte van de kracht in kN waarmee een koord in de beginsituatie
    aan de capsule trekt. Geef je eindantwoord in één decimaal.
- label: b
  points: 0
  text: 'De twee krachten kun je weergeven met twee vectoren. De som van deze twee
    vectoren is een vector die een verticale kracht weergeeft met grootte \( F_{kv}
    \). De grootte van deze kracht kan berekend worden met de volgende formule:

    \[ F_{kv} = 2 \times F_k \times \cos(\alpha) \]

    Hierin is \( \alpha \) de hoek tussen een koord en de verticale vector. Zie figuur
    2.


    Op de capsule, inclusief de twee personen, werkt niet alleen de kracht van beide
    koorden, maar ook de zwaartekracht \( F_z \), die recht naar beneden is gericht.
    Zie figuur 3. Deze zwaartekracht bedraagt 1,8 kN. In figuur 2 en figuur 3 is ook
    het hoogteverschil tussen \( C \) en de toppen van de palen met \( x \) aangegeven.


    Na een aantal keren op en neer te zijn geslingerd, is de capsule tot stilstand
    gekomen. Op dat moment heft de zwaartekracht de twee krachten op die door de koorden
    samen worden uitgeoefend.


    Er geldt dan dus: \( F_{kv} = F_z \)


    De hoogte waarop de capsule tot stilstand komt, is te berekenen door eerst \(
    F_k \) in \( x \) uit te drukken.

    Druk \( F_{kv} \) uit in \( x \) en bereken daarmee hoe hoog de capsule boven
    de grond hangt als hij tot stilstand is gekomen. Geef je eindantwoord in gehele
    meters.'
