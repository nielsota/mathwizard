stem: 'De Slingshot is een kermisattractie. Tussen de toppen van twee palen hangt
  aan twee identieke elastische koorden een capsule die plaats biedt aan twee personen.
  Zie de foto.

  De capsule wordt allereerst omlaag getrokken tot aan de grond. Op dat moment gaan
  er twee personen in de capsule zitten. Vervolgens wordt de capsule losgelaten. De
  capsule schiet dan recht omhoog. Daarna valt hij recht omlaag, gaat weer omhoog,
  enzovoorts. Na enige tijd komt de capsule stil te hangen.


  Gegeven is:

  - De palen staan 14 m uit elkaar.

  - De palen staan verticaal.

  - De palen zijn 20 m hoog.

  - Zonder uittrekking heeft elk koord een lengte van 8 m.

  - Elk koord trekt aan de capsule met een kracht die afhangt van de lengte van het
  uitgerekte koord. De grootte van deze kracht kan berekend worden met de formule:

  \[ F_k = 0{,}6 \times (L - 8) \]

  Hierbij is \( F_k \) de grootte van de kracht in kN (kilonewton) en \( L \) de lengte
  van het uitgerekte koord in m (met \( L \geq 8 \)).


  In figuur 1 is de beginsituatie weergegeven. De capsule is aangegeven met het punt
  \( C \) en de toppen van de palen met \( A \) en \( B \). De capsule bevindt zich
  op de grond, midden tussen de palen. Beide koorden, \( CA \) en \( CB \), zijn dan
  flink uitgerekt en staan strak.'
title: Slingshot (kermisattractie)
