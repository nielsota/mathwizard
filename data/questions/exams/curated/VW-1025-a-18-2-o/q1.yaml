  text: 'Bewijs dat voor \( x \neq 0 \) geldt: \( f(x) = h(x) \).'
- label: '2.'
  points: 0
  text: 'Verder is de functie \( g \) gegeven door \( g(x) = \frac{4x^2 + x}{x} \).


    Er is een lijn \( k \) die voor \( x \neq 0 \) samenvalt met de grafiek van \(
    g \).


    In figuur 1 zijn de grafieken van \( f \) en \( g \) weergegeven.

    Punt \( P(0, 1) \) is de perforatie van beide grafieken.

    In figuur 2 zijn de grafiek van \( h \) en lijn \( k \) weergegeven en ook hun
    snijpunt \( P \).


    Er geldt:

    - de grafieken van \( f \) en \( g \) staan in hun perforatie \( P \) loodrecht
    op elkaar als

    - de grafiek van \( h \) en lijn \( k \) in hun snijpunt \( P \) loodrecht op
    elkaar staan.


    2. Bewijs dat de grafieken van \( f \) en \( g \) in hun perforatie \( P \) loodrecht
    op elkaar staan.'
