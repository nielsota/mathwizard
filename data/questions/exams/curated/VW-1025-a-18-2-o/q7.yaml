stem: 'Gegeven is het vierkant \( OABC \) met \( O(0, 0), A(4, 0) \) en \( C(0, 4)
  \).

  Het snijpunt van \( OB \) en \( AC \) is het punt \( S \).

  Het punt \( M(3, 2) \) is het middelpunt van een cirkel door \( A \) en \( B \).

  De punten \( F \) en \( G \) zijn de snijpunten van deze cirkel met \( CS \) respectievelijk
  \( OS \). Zie figuur 1.'
title: Vierkant OABC, cirkel met middelpunt M en punten F en G — bewijzen
